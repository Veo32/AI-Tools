name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aitools
          POSTGRES_USER: aitools
          POSTGRES_PASSWORD: aitools
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aitools -d aitools"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://aitools:aitools@localhost:5432/aitools?schema=public
      REDIS_URL: redis://localhost:6379
      APP_URL: http://localhost:3000
      API_URL: http://localhost:4000
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      COOKIE_SECRET: ci-cookie-secret
      CORS_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm db:generate
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

